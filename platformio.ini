; ============================================================================
; Co 2 environment:
;   [env:esp32dev]   -> build firmware chinh (main.cpp)
;   [env:test_bn1]   -> build file test rieng test_bn1.cpp de debug sensor
;
; Cach switch:
;   - Build firmware chinh : chay env:esp32dev (mac dinh)
;   - Test sensor BN#1     : chay env:test_bn1
; Tren PlatformIO toolbar: chon project env o goc duoi trai truoc khi Build/Upload.
; ============================================================================

[env]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200

lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library
    olikraus/U8g2
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    tzapu/WiFiManager@^2.0.17
    ; adafruit/Adafruit MPU6050 — khong dung nua (thay bang raw I2C trong sensor.cpp
    ;                             de ho tro MPU-6500, MPU-9250, clone)

; ---- Firmware chinh ----
[env:esp32dev]
build_src_filter = +<*> -<test_bn1.cpp>

; ---- Test rieng MAX30102 + MPU6050 cua BN#1 ----
[env:test_bn1]
build_src_filter = +<test_bn1.cpp>
